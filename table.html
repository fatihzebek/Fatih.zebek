<table style="min-width: 980px; width: 100%; border-collapse: collapse;">
                  <thead>
                    <tr style="background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05);">
                      <th style="padding: 1.2rem 1rem; width: 50px; text-align: center;">
                        <input type="checkbox" id="master-checkbox" onchange="window.toggleAllBatch(this.checked)" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-blue);">
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: left; font-size: 0.65rem; color: ${window.lastSortBy===`description`?`var(--accent-blue)`:`var(--text-dim)`}; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;" onclick="window.updateWarehouseUI('${e}', 'description')">
                          MALZEME TANIMI <i class="fa-solid fa-sort${window.lastSortBy===`description`?window.lastSortDir===`asc`?`-up`:`-down`:``}" style="margin-left: 5px; opacity: ${window.lastSortBy===`description`?`1`:`0.5`};"></i>
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: center; font-size: 0.65rem; color: ${window.lastSortBy===`sapNo`?`var(--accent-blue)`:`var(--text-dim)`}; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;" onclick="window.updateWarehouseUI('${e}', 'sapNo')">
                          SAP NO <i class="fa-solid fa-sort${window.lastSortBy===`sapNo`?window.lastSortDir===`asc`?`-up`:`-down`:``}" style="margin-left: 5px; opacity: ${window.lastSortBy===`sapNo`?`1`:`0.5`};"></i>
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: center; font-size: 0.65rem; color: ${window.lastSortBy===`quantity`?`var(--accent-blue)`:`var(--text-dim)`}; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;" onclick="window.updateWarehouseUI('${e}', 'quantity')">
                          STOK <i class="fa-solid fa-sort${window.lastSortBy===`quantity`?window.lastSortDir===`asc`?`-up`:`-down`:``}" style="margin-left: 5px; opacity: ${window.lastSortBy===`quantity`?`1`:`0.5`};"></i>
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: center; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">
                          REZERVE
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: left; font-size: 0.65rem; color: ${window.lastSortBy===`shelfNo`?`var(--accent-blue)`:`var(--text-dim)`}; text-transform: uppercase; letter-spacing: 1px; cursor: pointer;" onclick="window.updateWarehouseUI('${e}', 'shelfNo')">
                          KONUM <i class="fa-solid fa-sort${window.lastSortBy===`shelfNo`?window.lastSortDir===`asc`?`-up`:`-down`:``}" style="margin-left: 5px; opacity: ${window.lastSortBy===`shelfNo`?`1`:`0.5`};"></i>
                      </th>
                      <th style="padding: 1.2rem 1.5rem; text-align: right; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Aksiyon</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${r.length===0?`
                      <tr>
                        <td colspan="7" style="padding: 4rem 1.5rem; text-align: center;">
                          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; animation: fadeIn 0.3s ease-out;">
                            <div style="width: 56px; height: 56px; background: rgba(255, 77, 77, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--danger); font-size: 1.5rem; border: 1px solid rgba(255, 77, 77, 0.2);">
                              <i class="fa-solid fa-triangle-exclamation"></i>
                            </div>
                            <div>
                              <h4 style="margin: 0; color: #ff4d4d; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px;">BU ÜRÜN STOKTA YOK</h4>
                              <p style="margin: 6px 0 0 0; color: var(--text-dim); font-size: 0.85rem; font-weight: 500;">Aradığınız kriterlere uyan hiçbir malzeme bu depoda bulunamadı.</p>
                            </div>
                          </div>
                        </td>
                      </tr>
                    `:r.map(t=>`
                      <tr class="material-row" style="border-bottom: 1px solid rgba(255,255,255,0.02);">
                        <td style="padding: 1rem; text-align: center;">
                          <input type="checkbox" class="item-checkbox" data-id="${t.id}" data-sap="${t.sapNo}" data-desc="${(t.description||``).replace(/"/g,`&quot;`)}" onchange="window.updateBatchCount()" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-blue);">
                        </td>
